<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="wx_dart_native">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>wx_dart_native</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>

<!-- The Splash -->
<div id="mySplash" class="splash">

  <!-- Splash Content (The Image) -->
  <img class="splash-content" id="splash-content-image" src="Splash.png">

  <!-- Splash Caption (Image Text) -->
  <div id="splash-caption"></div>
</div>    
    
<script>
  if ((window.location.hash.length == 0) &&
      (window.location.search.length == 0))
  {
      var splash = document.getElementById("mySplash");
      splash.style.display = "block";

      var splashCap = document.getElementById("splash-caption");
      splashCap.style.display = "block";
      splashCap.innerHTML = "<H2>wxDart Native and wxDart Flutter</H2><H1>Dart GUI for desktop and the Web</H1>";

      var splashImg = document.getElementById("splash-content-image");
      splashImg.style.display = "block";

      setTimeout( function() { 
          splash.style.display = "none";
      }, 4000);
  }
</script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
