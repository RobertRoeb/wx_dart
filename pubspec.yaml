name: wx_dart
description: "Flutter backend of wxDart"
version: 0.9.0
homepage: https://github.com/RobertRoeb/wx_dart

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  single_child_two_dimensional_scroll_view: ^0.0.3
  url_launcher: ^6.3.2
  multi_split_view: ^3.6.1
  tabbed_view: ^2.0.0
  idle_detector_wrapper: ^1.2.1
  flutter_svg: ^2.2.2
  gif_view: ^1.0.3
  scrollable_positioned_list: ^0.3.8
  input_quantity: ^2.5.1
  flutter_html: ^3.0.0
  floating_dialog: ^1.1.1+1
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  desktop_window: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

